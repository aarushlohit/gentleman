name: gentleman
description: "Gentleman - Protecting your dignity, one tap at a time. Prevents accidental voice and video calls in WhatsApp and Instagram."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Platform Integration
  permission_handler: ^11.3.1
  device_info_plus: ^11.1.1
  package_info_plus: ^8.0.2

  # UI & Theming
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0

  # Utilities
  intl: ^0.19.0
  path_provider: ^2.1.4
  share_plus: ^10.0.2
  url_launcher: ^6.2.6
  vibration: ^3.1.1

  # Icons
  cupertino_icons: ^1.0.8
  lucide_icons: ^0.257.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.11
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png
  # Use `google_fonts` package for Google Sans at runtime (no local font assets required)
